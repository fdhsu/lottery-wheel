<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>大转盘抽奖</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; color: #333; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }

:root { --primary: #4A90D9; --card: #ffffff; --border: #e0e4e8; --text: #333; --text-light: #888; --shadow: 0 2px 12px rgba(0,0,0,0.08); }

.header { background: var(--card); padding: 12px 16px; display: flex; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
.header h1 { font-size: 18px; font-weight: 600; }

.main { flex: 1; padding-bottom: 60px; }
.tab-page { display: none; }
.tab-page.active { display: block; }

.tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); display: flex; z-index: 10; }
.tab-bar button { flex: 1; padding: 10px 0 8px; text-align: center; font-size: 12px; color: var(--text-light); display: flex; flex-direction: column; align-items: center; gap: 2px; }
.tab-bar button.active { color: var(--primary); }
.tab-bar button svg { width: 22px; height: 22px; }

.wheel-section { display: flex; flex-direction: column; align-items: center; padding: 20px 16px 10px; }
.wheel-container { position: relative; width: min(85vw, 380px); aspect-ratio: 1; }
.wheel-canvas { width: 100%; height: 100%; display: block; }

.go-btn {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 86px; border-radius: 50%; aspect-ratio: 1;
  background: radial-gradient(circle at 38% 32%, #FF5252, #E53935 50%, #C62828);
  color: #fff; font-size: 15px; font-weight: 700; line-height: 1.3;
  text-align: center; letter-spacing: 2px;
  border: 6px solid #E8C87A;
  box-shadow: 0 0 0 2px rgba(232,200,122,0.3), 0 4px 14px rgba(0,0,0,0.25);
  z-index: 2; transition: transform .15s;
  display: flex; align-items: center; justify-content: center; flex-direction: column;
  padding: 0;
  text-shadow: 0 1px 2px rgba(0,0,0,0.25);
}
.go-btn::before {
  content: '';
  position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 11px solid transparent; border-right: 11px solid transparent;
  border-bottom: 20px solid #E53935;
  filter: drop-shadow(0 -1px 2px rgba(0,0,0,0.2));
}
.go-btn:active { transform: translate(-50%, -50%) scale(0.93); }
.go-btn.disabled { background: radial-gradient(circle at 38% 32%, #ddd, #bbb); border-color: #ccc; }
.go-btn.disabled::before { border-bottom-color: #bbb; }
.go-btn.spinning { pointer-events: none; }

.records-page { padding: 16px; }
.records-header h2 { font-size: 16px; margin-bottom: 12px; }
.record-list { list-style: none; }
.record-item { background: var(--card); border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.record-name { font-size: 15px; font-weight: 500; }
.record-time { font-size: 12px; color: var(--text-light); margin-top: 4px; }
.records-empty { text-align: center; padding: 60px 20px; color: var(--text-light); font-size: 14px; }

.result-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: center; justify-content: center; }
.result-overlay.show { display: flex; }
.result-card { background: var(--card); border-radius: 16px; padding: 32px 40px; text-align: center; animation: popIn .3s ease; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
@keyframes popIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.result-card .congrats { font-size: 14px; color: var(--text-light); margin-bottom: 8px; }
.result-card .award-name { font-size: 28px; font-weight: 700; color: var(--primary); margin-bottom: 20px; }
.result-card .btn { padding: 10px 40px; border-radius: 8px; font-size: 14px; background: var(--primary); color: #fff; }

.toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 14px; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }

.loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 500; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #666; }
</style>
</head>
<body>

<div class="header"><h1 id="headerTitle">大转盘抽奖</h1></div>

<div class="main">
  <div class="tab-page active" id="pageWheel">
    <div class="wheel-section">
      <div class="wheel-container">
        <canvas class="wheel-canvas" id="wheelCanvas"></canvas>
        <button class="go-btn" id="goBtn" onclick="startSpin()">
          立即<br>抽奖
        </button>
      </div>
    </div>
  </div>

  <div class="tab-page" id="pageRecords">
    <div class="records-page">
      <div class="records-header"><h2>中奖记录</h2></div>
      <ul class="record-list" id="recordList"></ul>
      <div class="records-empty" id="recordsEmpty" style="display:none;">暂无中奖记录</div>
    </div>
  </div>
</div>

<div class="tab-bar">
  <button class="active" onclick="switchTab(0, this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    转盘
  </button>
  <button onclick="switchTab(1, this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    记录
  </button>
</div>

<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <div class="congrats">恭喜获得</div>
    <div class="award-name" id="resultAwardName"></div>
    <button class="btn" onclick="closeResult()">好的</button>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">加载中...</div>
<div class="toast" id="toast"></div>

<script>
const API = '/api';
let config = { awardList: [], forceQueue: [], rotateTime: 5 };
let records = { recordList: [] };
let isSpinning = false;
let currentRotation = 0;

const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');

// ===== Init: Load from API =====
let lastConfigHash = '';

async function init() {
  try {
    const [cfgRes, recRes] = await Promise.all([fetch(`${API}/config`), fetch(`${API}/records`)]);
    config = await cfgRes.json();
    records = await recRes.json();
  } catch (e) {
    showToast('无法连接服务器，请确保后端已启动');
    document.getElementById('loadingOverlay').style.display = 'none';
    return;
  }
  document.getElementById('loadingOverlay').style.display = 'none';
  drawWheel();
  updateGoButton();
  renderRecords();

  // Store initial config hash for change detection
  lastConfigHash = JSON.stringify(config.awardList.sort((a,b) => a.id.localeCompare(b.id)));

  // Poll for config changes every 3 seconds
  setInterval(async () => {
    try {
      const res = await fetch(`${API}/config`);
      const newConfig = await res.json();
      const newHash = JSON.stringify(newConfig.awardList.sort((a,b) => a.id.localeCompare(b.id)));
      if (newHash !== lastConfigHash) {
        lastConfigHash = newHash;
        config = newConfig;
        drawWheel();
        updateGoButton();
        console.log('[Auto-refresh] Config updated');
      }
    } catch (e) {
      // Silently fail on network issues
    }
  }, 3000);

  let resizeTimer;
  window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(drawWheel, 150); });
}

// ===== Wheel Drawing =====
function drawWheel() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  const size = Math.floor(rect.width);
  if (size <= 0) return;
  canvas.width = size * dpr; canvas.height = size * dpr;
  canvas.style.width = size + 'px'; canvas.style.height = size + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const cx = size / 2, cy = size / 2;
  const radius = size / 2 - 2;
  const awards = config.awardList;
  if (awards.length === 0) return;
  const totalWeight = awards.reduce((s, a) => s + a.weight, 0);
  const n = awards.length;

  ctx.clearRect(0, 0, size, size);

  // Adaptive parameters based on award count
  const bulbCount = n <= 4 ? 16 : n <= 6 ? 20 : n <= 8 ? 24 : 28;
  const bulbRadius = size > 320 ? 5.5 : 4;

  // --- Outer ring: bright red ---
  const outerR = radius;
  const outerGrad = ctx.createRadialGradient(cx, cy, outerR * 0.85, cx, cy, outerR);
  outerGrad.addColorStop(0, '#F44336');
  outerGrad.addColorStop(0.7, '#E53935');
  outerGrad.addColorStop(1, '#C62828');
  ctx.beginPath(); ctx.arc(cx, cy, outerR, 0, Math.PI * 2);
  ctx.fillStyle = outerGrad; ctx.fill();

  // Inner edge highlight of outer ring
  ctx.beginPath(); ctx.arc(cx, cy, outerR * 0.97, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1.5; ctx.stroke();

  // --- White marquee light bulbs ---
  const bulbR = outerR * 0.91;
  for (let i = 0; i < bulbCount; i++) {
    const angle = (i / bulbCount) * Math.PI * 2 - Math.PI / 2;
    const dx = cx + Math.cos(angle) * bulbR;
    const dy = cy + Math.sin(angle) * bulbR;
    // Glow halo
    ctx.beginPath(); ctx.arc(dx, dy, bulbRadius + 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fill();
    // White bulb
    ctx.beginPath(); ctx.arc(dx, dy, bulbRadius, 0, Math.PI * 2);
    ctx.fillStyle = '#FFFFFF'; ctx.fill();
    // Subtle inner shadow for 3D effect
    ctx.beginPath(); ctx.arc(dx, dy, bulbRadius * 0.6, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200,200,200,0.15)'; ctx.fill();
  }

  // --- Gold separator ring ---
  const sepR = outerR * 0.82;
  ctx.beginPath(); ctx.arc(cx, cy, sepR, 0, Math.PI * 2);
  ctx.strokeStyle = '#E8C87A'; ctx.lineWidth = 3; ctx.stroke();

  // --- Rotating sectors: multi-color carnival palette ---
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(currentRotation);
  const wheelR = sepR - 5;
  let startAngle = 0;

  // 3-color warm carnival palette, ensure no adjacent sectors share a color
  const sectorColors = ['#FFF9F0', '#F0DCC0', '#FDE8EF'];

  // Pre-compute color index for each sector, fixing wraparound conflict
  const colorIndices = awards.map((_, i) => i % 3);
  if (awards.length >= 3 && colorIndices[0] === colorIndices[awards.length - 1]) {
    // First and last would be same color — shift last to a different one
    colorIndices[awards.length - 1] = (colorIndices[0] + 1) % 3;
  }

  awards.forEach((award, i) => {
    const sliceAngle = (award.weight / totalWeight) * Math.PI * 2;
    ctx.beginPath(); ctx.moveTo(0, 0);
    ctx.arc(0, 0, wheelR, startAngle, startAngle + sliceAngle);
    ctx.closePath();

    // Subtle radial gradient for depth
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, wheelR);
    const baseColor = sectorColors[colorIndices[i]];
    grad.addColorStop(0, 'rgba(255,255,255,0.6)');
    grad.addColorStop(0.35, baseColor);
    grad.addColorStop(1, baseColor);
    ctx.fillStyle = grad;
    ctx.fill();

    // Sector divider lines (warm neutral)
    ctx.strokeStyle = 'rgba(200,175,140,0.3)'; ctx.lineWidth = 1; ctx.stroke();

    // Award name text (deep red)
    ctx.save(); ctx.rotate(startAngle + sliceAngle / 2);
    const textMaxWidth = wheelR * 0.6;
    const fontSize = calcFontSize(award.name, textMaxWidth, sliceAngle, wheelR);
    ctx.font = `700 ${fontSize}px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif`;
    ctx.fillStyle = '#B71C1C';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.06)';
    ctx.shadowBlur = 1;
    ctx.fillText(award.name, wheelR * 0.58, 0, textMaxWidth);
    ctx.shadowColor = 'transparent';
    ctx.restore();

    startAngle += sliceAngle;
  });
  ctx.restore();
}

function calcFontSize(text, maxWidth, sliceAngle, radius) {
  const n = config.awardList.length;
  // Adaptive base size: smaller when more awards
  const baseSize = n <= 4 ? 18 : n <= 6 ? 15 : n <= 8 ? 13 : 11;
  ctx.font = `700 ${baseSize}px -apple-system, "PingFang SC", sans-serif`;
  let measured = ctx.measureText(text).width;
  let size = baseSize;
  if (measured > maxWidth) size = Math.max(9, size * maxWidth / measured);
  // For narrow slices, reduce further
  const arcWidth = sliceAngle * radius * 0.4;
  if (arcWidth < 20) size = Math.max(9, size * 0.8);
  return Math.round(size);
}

function getTextColor(bg) {
  const hex = bg.replace('#', '');
  const lum = (0.299 * parseInt(hex.substr(0,2),16) + 0.587 * parseInt(hex.substr(2,2),16) + 0.114 * parseInt(hex.substr(4,2),16)) / 255;
  return lum > 0.55 ? '#2c2c2c' : '#ffffff';
}

// ===== Spin =====
async function startSpin() {
  if (isSpinning) return;
  if (config.awardList.length < 2) { showToast('至少2个奖项可抽奖'); return; }

  isSpinning = true;
  document.getElementById('goBtn').classList.add('spinning');

  // Request draw result from server
  let drawResult;
  try {
    const res = await fetch(`${API}/draw`, { method: 'POST' });
    drawResult = await res.json();
    if (!res.ok) throw new Error(drawResult.error || '抽奖失败');
  } catch (e) {
    isSpinning = false;
    document.getElementById('goBtn').classList.remove('spinning');
    showToast(e.message);
    return;
  }

  const targetAward = drawResult.award;

  // Calculate target angle
  const totalWeight = config.awardList.reduce((s, a) => s + a.weight, 0);
  let targetMidAngle = 0, cumAngle = 0;
  for (const award of config.awardList) {
    const sliceAngle = (award.weight / totalWeight) * 360;
    if (award.id === targetAward.id) { targetMidAngle = cumAngle + sliceAngle / 2; break; }
    cumAngle += sliceAngle;
  }

  const fullSpins = 5 + Math.floor(Math.random() * 3);
  const startRotationDeg = (currentRotation * 180 / Math.PI) % 360;
  const targetDeltaDeg = fullSpins * 360 + (270 - targetMidAngle - startRotationDeg);

  const duration = config.rotateTime * 1000;
  const startRotation = currentRotation;
  const totalDelta = targetDeltaDeg * Math.PI / 180;
  const startTime = performance.now();

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    currentRotation = startRotation + totalDelta * eased;
    drawWheel();

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      currentRotation = currentRotation % (Math.PI * 2);
      isSpinning = false;
      document.getElementById('goBtn').classList.remove('spinning');

      playResultSound();
      showResult(targetAward);
      speakResult(targetAward.name);

      // Refresh records
      fetch(`${API}/records`).then(r => r.json()).then(d => { records = d; renderRecords(); });
    }
  }
  requestAnimationFrame(animate);
}

// ===== Sound & Voice =====
function playResultSound() {
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;
    const ctx = new AudioCtx();
    [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = freq;
      const t = ctx.currentTime + i * 0.2;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.3, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.25);
    });
  } catch (e) {}
}

let selectedVoice = null;

// Pre-load and cache a female Chinese voice
function loadFemaleVoice() {
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) return;
  const zhVoices = voices.filter(v => v.lang.startsWith('zh'));
  const femaleKeywords = ['female', 'woman', 'girl', 'ting', 'mei', 'lili', 'sin-ji', 'xiaoyan', 'xiaoxiao', 'yunyang', 'huihui'];
  selectedVoice = zhVoices.find(v => femaleKeywords.some(k => v.name.toLowerCase().includes(k))) || zhVoices[0] || null;
}
if (window.speechSynthesis) {
  loadFemaleVoice();
  window.speechSynthesis.onvoiceschanged = loadFemaleVoice;
}

function speakResult(name) {
  try {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance('恭喜，抽中了' + name);
    u.lang = 'zh-CN'; u.pitch = 1.15; u.rate = 0.95;
    if (selectedVoice) u.voice = selectedVoice;
    window.speechSynthesis.speak(u);
  } catch (e) {}
}

// ===== UI =====
function showResult(award) {
  document.getElementById('resultAwardName').textContent = award.name;
  document.getElementById('resultOverlay').classList.add('show');
}
function closeResult() { document.getElementById('resultOverlay').classList.remove('show'); }

function switchTab(idx, btn) {
  document.querySelectorAll('.tab-page').forEach((p, i) => p.classList.toggle('active', i === idx));
  document.querySelectorAll('.tab-bar button').forEach((b, i) => b.classList.toggle('active', i === idx));
  if (idx === 1) renderRecords();
}

function renderRecords() {
  const list = document.getElementById('recordList');
  const empty = document.getElementById('recordsEmpty');
  list.innerHTML = '';
  if (!records.recordList || records.recordList.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  records.recordList.forEach(r => {
    const li = document.createElement('li');
    li.className = 'record-item';
    li.innerHTML = `<div class="record-name">${escHtml(r.award_name || r.awardName)}</div><div class="record-time">${escHtml(r.time)}</div>`;
    list.appendChild(li);
  });
}

function updateGoButton() {
  document.getElementById('goBtn').classList.toggle('disabled', config.awardList.length < 2);
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
let toastTimer;
function showToast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 2000); }

// ===== Secret Menu (long-press title) =====
(function() {
  const title = document.getElementById('headerTitle');
  let timer;
  const on = e => { e.preventDefault(); timer = setTimeout(() => window.location.href = '/admin.html', 1500); };
  const off = () => clearTimeout(timer);
  title.addEventListener('mousedown', on);
  title.addEventListener('touchstart', on, { passive: false });
  title.addEventListener('mouseup', off);
  title.addEventListener('mouseleave', off);
  title.addEventListener('touchend', off);
  title.addEventListener('touchcancel', off);
})();

init();
</script>
</body>
</html>
